name: Automated Tests

on:
  push:
    branches: [main, 2.x, 3-dev]
  pull_request:
    branches: [main, 2.x, 3-dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, mbstring, zip
          coverage: none
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: composer lint:test

  analyse:
    runs-on: ubuntu-latest
    name: Static Analysis
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, mbstring, zip
          coverage: none
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: composer analyse

  tests:
    runs-on: ubuntu-latest
    name: Tests (PHP 8.2, SQLite)
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, mbstring, zip
          coverage: xdebug
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run tests with coverage
        run: vendor/bin/pest --coverage --coverage-clover=coverage.xml
      - name: Debug coverage file
        run: |
          echo "=== Checking coverage file ==="
          ls -la coverage.xml || echo "coverage.xml not found!"
          echo "=== File size ==="
          wc -l coverage.xml || echo "Cannot count lines"
          echo "=== First 30 lines ==="
          head -30 coverage.xml || echo "Cannot read file"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          slug: atlas-php/atlas
          fail_ci_if_error: true
          verbose: true

  tests-persistence:
    runs-on: ubuntu-latest
    name: Tests — Persistence (PHP 8.2, PostgreSQL)
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, mbstring, zip, pdo_pgsql
          coverage: none
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run persistence tests against PostgreSQL
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: atlas_test
          DB_USERNAME: atlas
          DB_PASSWORD: secret
          ATLAS_PERSISTENCE_ENABLED: true
        run: vendor/bin/pest tests/Unit/Persistence tests/Feature/Persistence
