codecov:
  require_ci_to_pass: false
  branch: 3-dev

ignore:
  - "sandbox"
  - "tests"

coverage:
  precision: 2
  round: down
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 90%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
